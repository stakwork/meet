name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Only NEXT_PUBLIC_* vars are needed at build time — they get inlined into
      # the client bundle by Next.js. All secrets (LIVEKIT_API_KEY, LIVEKIT_API_SECRET,
      # S3_*, etc.) are provided at runtime via the orchestrator (see prod.yaml).
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SHOW_SETTINGS_MENU=true
            NEXT_PUBLIC_LK_RECORD_ENDPOINT=/api/record
          tags: |
            sphinxlightning/sphinx-livekit:latest
            sphinxlightning/sphinx-livekit:${{ steps.vars.outputs.sha }}
