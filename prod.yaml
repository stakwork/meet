services:
  caddy:
    image: caddy:2.8.4-alpine
    restart: unless-stopped
    container_name: caddy.sphinx
    # command: caddy reverse-proxy --from https://$DOMAIN:443 --to http://livekit.sphinx:3000
    ports:
      - 80:80
      - 443:443
    volumes:
      - caddy:/data
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - livekit
    environment:
      - DOMAIN=$DOMAIN

  livekit:
    image: sphinxlightning/sphinx-livekit:latest
    restart: on-failure
    command: ['node', 'server.js']
    container_name: livekit.sphinx
    environment:
      - HOSTNAME=0.0.0.0
    ports:
      - 3000:3000

  voice:
    image: sphinxlightning/sphinx-voice:latest
    container_name: voice.sphinx
    restart: on-failure
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - MCP_SERVERS=${MCP_SERVERS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PRELIMINARY_FEATURE_INTENT=${PRELIMINARY_FEATURE_INTENT}
      - HIVE_MCP_URL=${HIVE_MCP_URL}
      - IGNORE_ROOM_PREFIX=${IGNORE_ROOM_PREFIX}

volumes:
  caddy:
